<form id="changemoney-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <input type="hidden" name="type" value="{$type}">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">账号:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" type="text" value="{$row.username|htmlentities}" disabled>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">当前余额:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" type="text" value="{$row.money|htmlentities}" disabled>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{if condition="$type eq 'add'"}上分{else}下分{/if}金额:</label>
        <div class="col-xs-12 col-sm-8">
            <input name="amount" data-rule="required" class="form-control" type="number" step="0.01" min="0.01" placeholder="请输入金额">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">备注:</label>
        <div class="col-xs-12 col-sm-8">
            <input name="memo" class="form-control" type="text" placeholder="选填">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
