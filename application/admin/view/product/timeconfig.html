<form id="timeconfig-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">产品:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.name} ({$row.product_code})</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">时间盘配置:</label>
        <div class="col-xs-12 col-sm-8">
            <table class="table table-bordered" id="config-table">
                <thead><tr><th width="40%">结算时间(秒)</th><th width="40%">赔率</th><th width="20%">操作</th></tr></thead>
                <tbody>
                {volist name="timeConfig" id="c"}
                <tr>
                    <td><input type="number" name="config[{$i}][minute]" class="form-control" value="{$c.minute}"/></td>
                    <td><input type="number" name="config[{$i}][odds]" class="form-control" step="0.01" value="{$c.odds}"/></td>
                    <td><a href="javascript:;" class="btn btn-xs btn-danger btn-timeconfig-remove">删除</a></td>
                </tr>
                {/volist}
                </tbody>
            </table>
            <a href="javascript:;" class="btn btn-xs btn-success" id="btn-add-timeconfig">添加配置</a>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">保存</button>
        </div>
    </div>
</form>
