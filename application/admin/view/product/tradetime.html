<form id="tradetime-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">产品:</label>
        <div class="col-xs-12 col-sm-8">
            <p class="form-control-static">{$row.name} ({$row.product_code})</p>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">交易时段:</label>
        <div class="col-xs-12 col-sm-8">
            <table class="table table-bordered" id="time-table">
                <thead><tr><th width="40%">开始时间</th><th width="40%">结束时间</th><th width="20%">操作</th></tr></thead>
                <tbody>
                {volist name="times" id="t"}
                <tr>
                    <td><input type="text" name="times[{$i}][deal_time_start]" class="form-control" value="{$t.deal_time_start}" placeholder="如09:15"/></td>
                    <td><input type="text" name="times[{$i}][deal_time_end]" class="form-control" value="{$t.deal_time_end}" placeholder="如12:00"/></td>
                    <td><a href="javascript:;" class="btn btn-xs btn-danger btn-tradetime-remove">删除</a></td>
                </tr>
                {/volist}
                </tbody>
            </table>
            <a href="javascript:;" class="btn btn-xs btn-success" id="btn-add-tradetime">添加时段</a>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">保存</button>
        </div>
    </div>
</form>
