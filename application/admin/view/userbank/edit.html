<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">用户账号:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" type="text" value="{$userAccount}" readonly disabled style="background:#f5f5f5;">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Type')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-type" data-rule="required" class="form-control selectpicker" name="row[type]">
                {foreach name="typeList" item="vo"}
                <option value="{$key}" {in name="key" value="$row.type"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <!-- 银行卡字段 -->
    <div class="form-group bank-field" {if $row.type == 'usdt'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">{:__('Bank_name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-bank_name" class="form-control" name="row[bank_name]" type="text" value="{$row.bank_name|htmlentities}">
        </div>
    </div>
    <div class="form-group bank-field" {if $row.type == 'usdt'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">{:__('Card_no')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-card_no" class="form-control" name="row[card_no]" type="text" value="{$row.card_no|htmlentities}">
        </div>
    </div>
    <div class="form-group bank-field" {if $row.type == 'usdt'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">{:__('Holder_name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-holder_name" class="form-control" name="row[holder_name]" type="text" value="{$row.holder_name|htmlentities}">
        </div>
    </div>
    <div class="form-group bank-field" {if $row.type == 'usdt'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">{:__('Branch')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-branch" class="form-control" name="row[branch]" type="text" value="{$row.branch|htmlentities}">
        </div>
    </div>
    <!-- USDT字段 -->
    <div class="form-group usdt-field" {if $row.type != 'usdt'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">{:__('Wallet_address')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-wallet_address" class="form-control" name="row[wallet_address]" type="text" value="{$row.wallet_address|htmlentities}">
        </div>
    </div>
    <div class="form-group usdt-field" {if $row.type != 'usdt'}style="display:none;"{/if}>
        <label class="control-label col-xs-12 col-sm-2">{:__('Chain_type')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-chain_type" class="form-control" name="row[chain_type]" type="text" value="{$row.chain_type|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
